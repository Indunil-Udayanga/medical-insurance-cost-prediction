<!DOCTYPE html>
<html>
<head>
    <title>Insurance Cost Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="card">

    <h1>Insurance Cost Predictor</h1>
    <p class="subtitle">Fill in your health details to estimate your insurance premium</p>

    <form action="/predict" method="post">

        <!-- ── Personal ── -->
        <p class="section-label">Personal</p>

        <div class="row">
            <div class="input-group">
                <input type="number" name="age" required placeholder=" " min="0">
                <label>Age</label>
            </div>
            <div class="input-group">
                <input type="number" step="0.1" name="bmi" required placeholder=" " min="0">
                <label>BMI</label>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <select name="sex" required>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
                <label>Sex</label>
            </div>
            <div class="input-group">
                <input type="number" name="children" required placeholder=" " min="0">
                <label>Children</label>
            </div>
        </div>

        <!-- ── Health Vitals ── -->
        <p class="section-label">Health Vitals</p>

        <div class="row">
            <div class="input-group">
                <input type="number" name="blood_pressure" required placeholder=" " min="0">
                <label>Blood Pressure</label>
            </div>
            <div class="input-group">
                <input type="number" name="cholesterol" required placeholder=" " min="0">
                <label>Cholesterol</label>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <input type="number" name="glucose" required placeholder=" " min="0">
                <label>Glucose</label>
            </div>
            <div class="input-group">
                <input type="number" name="heart_rate" required placeholder=" " min="0">
                <label>Heart Rate</label>
            </div>
        </div>

        <!-- ── Lifestyle ── -->
        <p class="section-label">Lifestyle</p>

        <div class="input-group">
            <select name="smoker" required>
                <option value="no">Non-Smoker</option>
                <option value="yes">Smoker</option>
            </select>
            <label>Smoking Status</label>
        </div>

        <div class="row">
            <div class="input-group">
                <select name="exercise_level" required>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <label>Exercise Level</label>
            </div>
            <div class="input-group">
                <select name="alcohol_intake" required>
                    <option value="none">None</option>
                    <option value="moderate">Moderate</option>
                    <option value="high">High</option>
                </select>
                <label>Alcohol Intake</label>
            </div>
        </div>

        <button type="submit">Predict Insurance Cost</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>
</body>
</html>
