<!DOCTYPE html>
<html>
<head>
    <title>Insurance Cost Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Insurance Cost Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" name="age" placeholder="Age" required>

        <input type="number" step="0.1" name="bmi" placeholder="BMI" required>

        <input type="number" name="children" placeholder="Children" required>

        <input type="number" name="blood_pressure" placeholder="Blood Pressure" required>

        <input type="number" name="cholesterol" placeholder="Cholesterol" required>

        <input type="number" name="glucose" placeholder="Glucose" required>

        <input type="number" name="heart_rate" placeholder="Heart Rate" required>

        <select name="sex" required>
            <option value="female">Female</option>
            <option value="male">Male</option>
        </select>

        <select name="smoker" required>
            <option value="no">Non-Smoker</option>
            <option value="yes">Smoker</option>
        </select>

        <select name="exercise_level" required>
            <option value="low">Low Exercise</option>
            <option value="medium">Medium Exercise</option>
            <option value="high">High Exercise</option>
        </select>

        <select name="alcohol_intake" required>
            <option value="none">No Alcohol</option>
            <option value="moderate">Moderate</option>
            <option value="high">High</option>
        </select>

        <button type="submit">Predict Insurance Cost</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h2>{{ prediction_text }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
